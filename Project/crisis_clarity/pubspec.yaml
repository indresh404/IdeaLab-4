name: crisis_clarity
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Add Lottie for animations
  lottie: ^3.1.2
  visibility_detector: ^0.4.0
  animate_do: ^3.3.4        # Easy staggered animations
  smooth_page_indicator: ^1.1.0  # For animation dots indicator
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Add assets section
  assets:
    - assets/animations/
    - assets/icons/